version: '3.9'

services:
  web:
    build: .
    env_file: .env
    volumes:
      - .:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - db
    command: ["./scripts/entrypoint.sh"]

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lafzverse
      POSTGRES_USER: lafzverse
      POSTGRES_PASSWORD: lafzverse
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    image: nginx:1.25
    ports:
      - "80:80"
    depends_on:
      - web
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/staticfiles:ro
      - media_data:/media:ro

volumes:
  postgres_data:
  static_data:
  media_data:
